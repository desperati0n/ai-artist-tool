<!DOCTYPE html>
<html lang="zh-CN" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Manager v12.0</title>
    <meta name="description" content="A lightweight, local-first AI Artist & Prompt Manager. Organize, combine, and preview your artist styles seamlessly.">
    <meta name="author" content="desperati0n">
    <meta property="og:title" content="AI Artist Manager v12.0">
    <meta property="og:description" content="A lightweight, local-first AI Artist & Prompt Manager for Stable Diffusion and NovelAI.">
    <meta property="og:url" content="https://desperati0n.github.io/ai-artist-tool/">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z'/%3E%3Cpath d='m15 5 4 4'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.2s ease-out', 'slide-up': 'slideUp 0.3s ease-out' },
                    keyframes: { 
                        fadeIn: { from: { opacity: 0, transform: 'scale(0.98)' }, to: { opacity: 1, transform: 'scale(1)' } },
                        slideUp: { from: { opacity: 0, transform: 'translateY(20px)' }, to: { opacity: 1, transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { background: linear-gradient(135deg, #e0e7ff, #f3e8ff, #fce7f3); color: #1e293b; }
        .dark body { background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81); color: #f8fafc; }
        #app { display: flex; flex-direction: column; height: 100%; position: relative; z-index: 1; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.4); border-radius: 99px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.2); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .dark .glass-card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); }

        .layout-container { display: flex; flex: 1; overflow: hidden; padding: 1rem; gap: 1rem; }
        .sidebar-left { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; border-radius: 1.5rem; overflow: hidden; }
        .main-area { flex: 1; display: flex; flex-direction: column; border-radius: 1.5rem; overflow: hidden; position: relative; }
        .sidebar-right { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; border-radius: 1.5rem; overflow: hidden; }

        .card-selected { outline: 3px solid #6366f1; outline-offset: 2px; transform: scale(0.96); }
        .dark .card-selected { outline: 3px solid #818cf8; outline-offset: 2px; }
        .batch-selected { outline: 3px solid #ef4444; outline-offset: 2px; transform: scale(0.96); }
        .capsule-bg { transition: all 0.3s ease; }

        .artist-drag-item { cursor: grab; transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease; }
        .artist-drag-item:active { cursor: grabbing; }
        .artist-drag-item.dragging { opacity: 0.4; transform: scale(0.96); }
        .artist-drag-item.drag-over-top { border-top: 2px solid #6366f1 !important; }
        .artist-drag-item.drag-over-bottom { border-bottom: 2px solid #6366f1 !important; }
        .artist-drag-handle { cursor: grab; color: #94a3b8; transition: color 0.15s ease; }
        .artist-drag-handle:hover { color: #6366f1; }
        .artist-move-btn { padding: 2px; border-radius: 4px; color: #94a3b8; transition: all 0.15s ease; display: flex; align-items: center; justify-content: center; }
        .artist-move-btn:hover { color: #6366f1; background: rgba(99,102,241,0.1); }
        .artist-move-btn:disabled { opacity: 0.2; pointer-events: none; }

        @media (max-width: 1280px) { .sidebar-right { width: 300px; } .sidebar-left { width: 200px; } }
        @media (max-width: 1024px) { .sidebar-right { display: none; } }
        @media (max-width: 768px) { .sidebar-left { display: none; } .layout-container { flex-direction: column; } }

        #artist-preview-tooltip {
            position: fixed; z-index: 200; pointer-events: none; display: none;
            width: 180px; border-radius: 16px; overflow: hidden;
            box-shadow: 0 20px 40px -8px rgba(0,0,0,0.35);
            background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.5);
            opacity: 0; transition: opacity 0.18s ease;
        }
        .dark #artist-preview-tooltip { background: rgba(15,23,42,0.95); border-color: rgba(255,255,255,0.08); }
        #artist-preview-tooltip.show { display: block; opacity: 1; }
        #artist-preview-tooltip img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
        #artist-preview-tooltip .preview-label { padding: 8px 12px; font-size: 11px; font-weight: 700; color: #334155; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dark #artist-preview-tooltip .preview-label { color: #e2e8f0; }
        #artist-preview-tooltip .preview-pct { font-size: 10px; color: #94a3b8; font-weight: 600; margin-left: 4px; }
        .pie-canvas-wrap { position: relative; }
    </style>
</head>
<body>

    <div id="app"></div>
    <div id="modal-container"></div>
    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>
    <div id="artist-preview-tooltip"></div>

    <script>
        // =========================================
        // 1. 数据库与存储
        // =========================================
        const DB_NAME = 'NAIArtistDB_V12'; // 升级版本
        const STORE_NAME = 'images';
        const METADATA_KEY = 'nai-v12-meta';
        const CATEGORY_KEY = 'nai-v12-cats';
        const PRESET_KEY = 'nai-v12-presets';
        const THEME_KEY = 'nai-v12-theme';

        const db = {
            conn: null,
            async open() {
                if (this.conn) return this.conn;
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, 1);
                    req.onerror = () => reject('DB Error');
                    req.onsuccess = (e) => { this.conn = e.target.result; resolve(this.conn); };
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                    };
                });
            },
            async put(id, data) {
                try {
                    const conn = await this.open();
                    return new Promise((r) => { const tx = conn.transaction(STORE_NAME, 'readwrite'); tx.objectStore(STORE_NAME).put(data, String(id)); tx.oncomplete = r; tx.onerror=()=>r(); });
                } catch(e){}
            },
            async get(id) {
                try {
                    const conn = await this.open();
                    return new Promise((r) => { const tx = conn.transaction(STORE_NAME, 'readonly'); const req = tx.objectStore(STORE_NAME).get(String(id)); req.onsuccess = () => r(req.result); req.onerror = () => r(null); });
                } catch(e) { return null; }
            },
            async delete(id) {
                try {
                    const conn = await this.open();
                    return new Promise((r) => { const tx = conn.transaction(STORE_NAME, 'readwrite'); tx.objectStore(STORE_NAME).delete(String(id)); tx.oncomplete = r; });
                } catch(e){}
            }
        };

        const compressImage = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_W = 400;
                    let w = img.width, h = img.height;
                    if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
            };
        });

        // =========================================
        // 2. 状态管理
        // =========================================
        let state = {
            artists: [],
            categories: [],
            presets: [],
            viewMode: 'artists', 
            searchQuery: '',
            currentCategory: '全部',
            sortMode: 'default',
            page: 1,
            pageSize: 24,
            selected: {}, 
            selectedOrder: [], // explicit order for selected artists
            batchMode: false,
            batchSelected: {}, 
            promptFormat: 'webui',
            pageImages: {}, 
            modal: null, 
            editingId: null,
            formData: {},
            theme: 'light'
        };

        const actions = {
            init: async () => {
                state.theme = localStorage.getItem(THEME_KEY) || 'light';
                const savedCats = localStorage.getItem(CATEGORY_KEY);
                state.categories = savedCats ? JSON.parse(savedCats) : ["二次元", "厚涂", "写实", "水墨", "黑白", "R18"];
                const savedPresets = localStorage.getItem(PRESET_KEY);
                state.presets = savedPresets ? JSON.parse(savedPresets) : [];
                const savedMeta = localStorage.getItem(METADATA_KEY);
                if(savedMeta) {
                    try {
                        const parsed = JSON.parse(savedMeta);
                        state.artists = parsed.map(a => ({
                            ...a, id: String(a.id), name: a.name||a.tag||'Unknown', tag: a.tag||a.name||'',
                            categories: Array.isArray(a.categories) ? a.categories : [a.category || '未分类']
                        }));
                    } catch(e) { state.artists = []; }
                }
                renderAppStructure();
                updateTheme();
                renderAll();
            },
            
            saveMeta: () => localStorage.setItem(METADATA_KEY, JSON.stringify(state.artists.map(({imageUrl, ...r})=>r))),
            saveCats: () => localStorage.setItem(CATEGORY_KEY, JSON.stringify(state.categories)),
            savePresets: () => localStorage.setItem(PRESET_KEY, JSON.stringify(state.presets)),
            setTheme: (t) => { state.theme = t; localStorage.setItem(THEME_KEY, t); updateTheme(); },

            setViewMode: (mode) => {
                state.viewMode = mode;
                state.page = 1;
                state.batchMode = false;
                state.batchSelected = {};
                renderSidebarLeft();
                renderGrid();
                renderMainHeader();
            },

            handleSearch: (val) => { state.searchQuery = val; state.page = 1; renderGrid(); },

            toggleCardClick: (id) => {
                id = String(id);
                if (state.batchMode) {
                    const newBatch = {...state.batchSelected};
                    if(newBatch[id]) delete newBatch[id]; else newBatch[id] = true;
                    state.batchSelected = newBatch;
                    updateCardVisual(id);
                    renderBatchBar();
                } else {
                    if (state.viewMode === 'presets') {
                        const p = state.presets.find(x => x.id === id);
                        if(p && p.items) {
                            p.items.forEach(item => {
                                state.selected[item.id] = item.weight || 1.0;
                                if (!state.selectedOrder.includes(item.id)) state.selectedOrder.push(item.id);
                            });
                            renderSidebarRight();
                            showToast(`已加载预设: ${p.name}`);
                        }
                    } else {
                        const newSel = {...state.selected};
                        if(newSel[id]) {
                            delete newSel[id];
                            state.selectedOrder = state.selectedOrder.filter(x => x !== id);
                        } else {
                            newSel[id] = 1.0;
                            state.selectedOrder.push(id);
                        }
                        state.selected = newSel;
                        updateCardVisual(id);
                        renderSidebarRight();
                    }
                }
            },

            toggleBatchMode: () => { state.batchMode = !state.batchMode; state.batchSelected = {}; renderMainHeader(); renderGrid(); },
            
            batchSelectAll: () => {
                const list = getFilteredList(); 
                const newBatch = {...state.batchSelected};
                const allSelected = list.every(a => newBatch[a.id]);
                list.forEach(a => { if(allSelected) delete newBatch[a.id]; else newBatch[a.id] = true; });
                state.batchSelected = newBatch;
                renderGrid(); renderBatchBar();
            },

            // --- 修复 2: 批量删除逻辑 (确保全局删除) ---
            batchDelete: async () => {
                const ids = Object.keys(state.batchSelected);
                if(ids.length === 0) return;
                
                if(!confirm(`确定要永久删除选中的 ${ids.length} 位画师吗？此操作将从所有分类中移除。`)) return;
                
                for(const id of ids) await db.delete(id);
                
                // 全局删除：直接过滤掉 ID 在选中列表里的画师
                state.artists = state.artists.filter(a => !state.batchSelected[String(a.id)]);
                
                // 清理选中态
                const newSel = {...state.selected};
                ids.forEach(id => delete newSel[id]);
                state.selected = newSel;
                
                state.batchSelected = {};
                state.batchMode = false;
                
                actions.saveMeta();
                renderAll(); // 刷新所有视图
                showToast("批量删除成功");
            },

            // 新增：仅从当前分类移除 (不删除数据)
            batchRemoveFromCategory: () => {
                const cat = state.currentCategory;
                if(cat === '全部' || cat === '未分类') return showToast("请使用批量删除功能");
                
                const ids = Object.keys(state.batchSelected);
                if(ids.length === 0) return;

                if(!confirm(`确定将选中的 ${ids.length} 位画师移出 "${cat}" 分类吗？`)) return;

                state.artists = state.artists.map(a => {
                    if(state.batchSelected[String(a.id)]) {
                        // 移除当前分类
                        const newCats = a.categories.filter(c => c !== cat);
                        // 如果没有分类了，归为未分类
                        if(newCats.length === 0) newCats.push('未分类');
                        return { ...a, categories: newCats };
                    }
                    return a;
                });

                state.batchSelected = {};
                state.batchMode = false;
                actions.saveMeta();
                renderAll();
                showToast("已移出分类");
            },

            openBatchCategoryModal: () => {
                if(Object.keys(state.batchSelected).length === 0) return showToast("请先选择画师");
                state.modal = 'batch-cat';
                renderModal();
            },
            
            batchAddCategories: (cats) => {
                state.artists = state.artists.map(a => {
                    if(state.batchSelected[String(a.id)]) {
                        const newCats = [...new Set([...a.categories, ...cats])];
                        return { ...a, categories: newCats };
                    }
                    return a;
                });
                actions.saveMeta();
                state.modal = null;
                state.batchMode = false;
                state.batchSelected = {};
                renderModal(); renderAll();
                showToast(`分类已更新`);
            },

            // --- 修复 1: 补全删除单个画师函数 ---
            deleteArtist: async (id) => {
                id = String(id);
                if(!confirm("确定要删除这位画师吗？")) return;
                
                try { await db.delete(id); } catch(e) { console.warn('DB delete error:', e); }
                state.artists = state.artists.filter(a => String(a.id) !== id);
                
                // 清理所有选中状态
                delete state.selected[id];
                delete state.batchSelected[id];
                delete state.pageImages[id];
                
                // 隐藏可能存在的预览提示
                hideArtistPreview();
                _hoveredPieIdx = -1;
                
                actions.saveMeta();
                try { renderAll(); } catch(e) { console.error('Render error after delete:', e); }
                showToast("已删除");
            },

            openAddPresetModal: () => {
                const ids = Object.keys(state.selected);
                if(ids.length === 0) return showToast("请先在右侧选择画师组合");
                state.modal = 'add-preset';
                state.formData = { name: '', imageUrl: '' };
                renderModal();
            },
            saveNewPreset: async () => {
                const { name, imageUrl } = state.formData;
                if(!name) return showToast("请输入预设名称");
                const ids = Object.keys(state.selected);
                const id = String(Date.now());
                if(imageUrl && imageUrl.startsWith('data:')) { await db.put(id, imageUrl); state.pageImages[id] = imageUrl; }
                const preset = { id, name, items: ids.map(mid => ({ id: mid, weight: state.selected[mid] })), createdAt: Date.now() };
                state.presets.unshift(preset);
                actions.savePresets();
                state.modal = null; renderModal();
                if(state.viewMode === 'presets') renderGrid();
                showToast("预设已保存");
            },
            openEditPreset: async (id) => {
                id = String(id);
                const p = state.presets.find(x => x.id === id);
                if(!p) return;
                let img = state.pageImages[id];
                if(!img) img = await db.get(id);
                state.modal = 'edit-preset'; state.editingId = id;
                state.formData = { name: p.name, imageUrl: img || '', items: p.items || [] };
                renderModal();
            },
            updatePreset: async () => {
                const { name, imageUrl } = state.formData;
                if(!name) return showToast("名称不能为空");
                const id = state.editingId;
                if(imageUrl && imageUrl.startsWith('data:')) { await db.put(id, imageUrl); state.pageImages[id] = imageUrl; }
                state.presets = state.presets.map(p => { if(p.id === id) { return { ...p, name, items: state.formData.items }; } return p; });
                actions.savePresets();
                state.modal = null; renderModal();
                if(state.viewMode === 'presets') renderGrid();
                showToast("预设已更新");
            },
            deletePreset: async (id) => {
                if(!confirm("删除此预设？")) return;
                state.presets = state.presets.filter(p => p.id !== String(id));
                await db.delete(String(id));
                actions.savePresets();
                renderGrid(); state.modal = null; renderModal();
            },

            // --- 智能导入 ---
            importData: async (file) => {
                if(!file) return;
                const reader = new FileReader();
                reader.onload = async(e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        const list = Array.isArray(json) ? json : (json.artists||[]);
                        const presets = json.presets || [];
                        showToast(`分析 ${list.length} 条数据...`);
                        
                        const existingTags = new Set(state.artists.map(a => a.tag.toLowerCase()));
                        const existingPresetNames = new Set(state.presets.map(p => p.name));
                        let addedCount = 0;

                        for(const item of list) {
                            let tag = item.tag || item.prompt || '';
                            let name = item.name || '';
                            if(!tag && name) tag = name;
                            if(!name && tag) name = tag;
                            
                            if(existingTags.has(tag.toLowerCase())) continue;

                            let id = String(Date.now() + Math.random());
                            
                            const img = item.imageUrl || item.image;
                            if(img && img.startsWith('data:')) await db.put(id, img);
                            
                            let cats = Array.isArray(item.categories) ? item.categories : [];
                            if(item.category && item.category !== '未分类') cats.push(item.category);
                            if(cats.length === 0) cats = ['未分类'];
                            cats = [...new Set(cats)];

                            const artist = {
                                id, name: name||'Unknown', tag: tag||'unknown',
                                categories: cats,
                                danbooruCount: parseInt(item.danbooruCount)||0,
                                createdAt: item.createdAt||Date.now()
                            };
                            
                            state.artists.push(artist); 
                            existingTags.add(tag.toLowerCase()); 
                            addedCount++;

                            cats.forEach(c => { if(c !== '未分类' && !state.categories.includes(c)) state.categories.push(c); });
                        }
                        
                        if(presets.length > 0) {
                            for(const p of presets) {
                                if(!existingPresetNames.has(p.name)) {
                                    let pid = String(Date.now() + Math.random());
                                    state.presets.push({ ...p, id: pid }); 
                                    existingPresetNames.add(p.name);
                                }
                            }
                            actions.savePresets();
                        }

                        actions.saveMeta();
                        actions.saveCats();
                        state.pageImages = {}; 
                        renderAll();
                        showToast(`导入完成! 新增 ${addedCount} 位画师`);
                    } catch(err) { console.error(err); showToast("导入失败"); }
                };
                reader.readAsText(file);
            },
            
            exportData: async () => {
                showToast("打包中...");
                const data = [];
                for(const a of state.artists) {
                    const img = await db.get(a.id);
                    data.push({...a, imageUrl: img||''});
                }
                const exportObj = { version: 12, artists: data, presets: state.presets };
                const blob = new Blob([JSON.stringify(exportObj)], {type:"application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `artist_manager_backup_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            },

            openEdit: async (id) => {
                id = String(id);
                const a = state.artists.find(x => String(x.id)===id);
                let img = '';
                if(a) {
                    img = state.pageImages[id];
                    if(!img) img = await db.get(id);
                }
                state.modal = 'add';
                state.editingId = id && id !== 'null' ? id : null;
                state.formData = {
                    name: a ? a.name : '',
                    tag: a ? a.tag : '',
                    categories: a ? [...a.categories] : ['未分类'],
                    imageUrl: img || '',
                    danbooruCount: a ? a.danbooruCount : 0
                };
                renderModal();
            },

            saveArtist: async () => {
                const { name, tag, categories, imageUrl, danbooruCount } = state.formData;
                if(!tag) return showToast("Tag 必填");
                const id = state.editingId ? String(state.editingId) : String(Date.now());
                
                if(imageUrl && imageUrl.startsWith('data:')) {
                    await db.put(id, imageUrl);
                    state.pageImages[id] = imageUrl;
                }
                
                let finalCats = categories && categories.length > 0 ? categories : ['未分类'];
                const newMeta = {
                    id, name: name||tag, tag, categories: finalCats,
                    danbooruCount: parseInt(danbooruCount)||0,
                    createdAt: state.editingId ? (state.artists.find(a=>String(a.id)===id)?.createdAt||Date.now()) : Date.now()
                };
                
                if(state.editingId) {
                    state.artists = state.artists.map(a => String(a.id)===id ? newMeta : a);
                } else {
                    state.artists.unshift(newMeta);
                    state.sortMode = 'default'; 
                    state.currentCategory = '全部';
                    state.page = 1;

                        return `

                                <div class="absolute top-2 left-2 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded backdrop-blur-md flex items-center gap-1 z-20 font-bold"><i data-lucide="flame" class="w-3 h-3 text-orange-400"></i> ${a.danbooruCount||0}</div>
                                ${!state.batchMode ? `<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-3 z-10">
                                    <div class="flex justify-end gap-2 mb-8">

                                <div class="flex gap-1 mt-1 overflow-hidden"><span class="text-[10px] text-slate-500 bg-slate-100 dark:bg-slate-700/50 px-1.5 rounded truncate font-mono">${a.tag}</span></div>
                            </div>
                        </div>`;
                    }).join('')}</div>`;
                    injectImages(pageItems);
                }
                footer.innerHTML = `<span class="text-slate-500">Total: ${list.length} Artists</span><div class="flex items-center gap-2"><button onclick="actions.setPage(${state.page-1})" ${state.page===1?'disabled':''} class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg disabled:opacity-30"><i data-lucide="chevron-left" class="w-5 h-5 dark:text-white"></i></button><span class="font-mono font-bold dark:text-white w-10 text-center text-base">${state.page}</span><button onclick="actions.setPage(${state.page+1})" ${state.page===totalPage?'disabled':''} class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg disabled:opacity-30"><i data-lucide="chevron-right" class="w-5 h-5 dark:text-white"></i></button></div>`;
            }
            // Restore scroll position synchronously to avoid flash
            container.scrollTop = savedGridScrollTop;
            lucide.createIcons(container);
            lucide.createIcons(footer);

        const updateCardVisual = (id) => {
            const card = document.getElementById(`card-${id}`);
            const check = document.getElementById(`check-${id}`);
            if(!card || !check) return;
            const isSel = !!state.selected[id];

        const injectImages = async (items) => {

        // =========================================
        // 饼状图 & 悬停预览
        // =========================================
        const PIE_COLORS = ['#818cf8','#f472b6','#fbbf24','#34d399','#60a5fa','#a78bfa','#f87171','#2dd4bf','#fb923c','#22d3ee','#a3e635','#e879f9','#67e8f9','#fdba74','#c4b5fd'];
        let _pieSegments = [];
        let _hoveredPieIdx = -1;

        const drawPieChart = (canvasId, items) => {
            const canvas = document.getElementById(canvasId);
            if (!canvas || items.length === 0) return;
            const dpr = window.devicePixelRatio || 1;
            const displayW = canvas.clientWidth;
            const displayH = canvas.clientHeight;
            canvas.width = displayW * dpr;
            canvas.height = displayH * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const cx = displayW / 2, cy = displayH / 2;
            const outerR = Math.min(cx, cy) - 12;
            const innerR = outerR * 0.52;
            const totalWeight = items.reduce((s, a) => s + (state.selected[String(a.id)] || 1), 0);
            let startAngle = -Math.PI / 2;
            _pieSegments = [];
            items.forEach((a, i) => {
                const weight = state.selected[String(a.id)] || 1;
                const slice = (weight / totalWeight) * Math.PI * 2;
                const endAngle = startAngle + slice;
                const hovered = _hoveredPieIdx === i;
                const r = hovered ? outerR + 5 : outerR;
                const ir = hovered ? innerR - 2 : innerR;
                ctx.beginPath();
                ctx.arc(cx, cy, r, startAngle, endAngle);
                ctx.arc(cx, cy, ir, endAngle, startAngle, true);
                ctx.closePath();
                const color = PIE_COLORS[i % PIE_COLORS.length];
                ctx.fillStyle = color;
                if (hovered) { ctx.shadowColor = color; ctx.shadowBlur = 14; }
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();
                const pct = ((weight / totalWeight) * 100);
                if (slice > 0.35) {
                    const mid = startAngle + slice / 2;
                    const lr = (r + ir) / 2;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 11px Inter,sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(Math.round(pct) + '%', cx + Math.cos(mid) * lr, cy + Math.sin(mid) * lr);
                }
                _pieSegments.push({ startAngle, endAngle, artist: a, index: i, color, pct: pct.toFixed(1) });
                startAngle = endAngle;
            });
            ctx.fillStyle = state.theme === 'dark' ? '#e2e8f0' : '#334155';
            ctx.font = 'bold 22px Inter,sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(items.length, cx, cy - 8);
            ctx.font = '11px Inter,sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText('位画师', cx, cy + 12);
        };

        const setupPieHover = (canvasId, items) => {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const displayW = canvas.clientWidth, displayH = canvas.clientHeight;
            const cx = displayW / 2, cy = displayH / 2;
            const outerR = Math.min(cx, cy) - 12;
            const innerR = outerR * 0.52;
            const totalWeight = items.reduce((s, a) => s + (state.selected[String(a.id)] || 1), 0);
            canvas.onmousemove = (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                const dx = mx - cx, dy = my - cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                let found = -1;
                if (dist >= innerR - 4 && dist <= outerR + 8) {
                    let mouseAngle = Math.atan2(dy, dx) + Math.PI / 2;
                    if (mouseAngle < 0) mouseAngle += Math.PI * 2;
                    let cum = 0;
                    for (let i = 0; i < items.length; i++) {
                        const w = state.selected[String(items[i].id)] || 1;
                        const slice = (w / totalWeight) * Math.PI * 2;
                        if (mouseAngle >= cum && mouseAngle < cum + slice) { found = i; break; }
                        cum += slice;
                    }
                }
                if (found !== _hoveredPieIdx) {
                    _hoveredPieIdx = found;
                    drawPieChart(canvasId, items);
                    if (found >= 0) {
                        showArtistPreview(String(items[found].id), e);
                        highlightArtistRow(found);
                    } else { hideArtistPreview(); highlightArtistRow(-1); }
                } else if (found >= 0) { movePreviewTooltip(e); }
            };
            canvas.onmouseleave = () => {
                if (_hoveredPieIdx !== -1) { _hoveredPieIdx = -1; drawPieChart(canvasId, items); hideArtistPreview(); highlightArtistRow(-1); }

        const highlightArtistRow = (idx) => {

            tooltip.style.top = top + 'px';

="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-slate-500 hover:text-indigo-600"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button><span class="text-xs font-mono w-8 text-center font-bold dark:text-white">${w.toFixed(1)}</span><button onclick="state.selected['${id}']=(state.selected['${id}']+0.1)||0.1;renderSidebarRight()" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-slate-500 hover:text-indigo-600"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button></div><button onclick="delete state.selected['${id}'];state.selectedOrder=state.selectedOrder.filter(x=>x!=='${id}');hideArtistPreview();updateCardVisual('${id}');renderSidebarRight()" class="ml-1 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg p-1 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button></div>`}).join('')}</div>
                <div class="p-5 border-t border-slate-200/50 dark:border-slate-700/50 space-y-3 bg-white/60 dark:bg-slate-900/60 backdrop-blur-md"><textarea id="res-box" readonly class="w-full h-24 text-sm p-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none dark:text-slate-300 shadow-inner" onclick="this.select()">${prompt}</textarea><div class="flex gap-2"><button onclick="actions.openAddPresetModal()" class="flex-1 py-2.5 bg-green-500 hover:bg-green-600 text-white rounded-xl text-xs font-bold shadow-lg shadow-green-500/30 flex items-center justify-center gap-1"><i data-lucide="save" class="w-4 h-4"></i> 存为预设</button><button onclick="document.getElementById('res-box').select();document.execCommand('copy');showToast('咒语已复制')" class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/30 flex items-center justify-center gap-2 active:scale-95 transition-transform"><i data-lucide="copy" class="w-4 h-4"></i> 复制</button><button onclick="state.selected={};state.selectedOrder=[];renderGrid();renderSidebarRight()" class="p-3 rounded-xl border border-red-200 text-red-500 hover:bg-red-50 hover:border-red-300 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button></div></div>`;

k="state.modal=null;renderModal()" class="px-5 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100">取消</button><button onclick="actions.updatePreset()" class="px-5 py-3 rounded-xl font-bold bg-indigo-600 text-white shadow-lg">更新</button></div></div></div>`;

                const div = document.createElement('div');
                div.innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in"><div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="state.modal=null;renderModal()"></div><div class="bg-white dark:bg-slate-900 w-full max-w-lg rounded-3xl p-6 relative z-10 shadow-2xl overflow-hidden transform transition-all"><h2 class="text-xl font-bold mb-5 dark:text-white">${isEdit?'编辑画师':'添加画师'}</h2><div class="space-y-4"><div class="flex gap-4"><div class="flex-1"><label class="text-xs font-bold text-slate-500 uppercase tracking-wider">名称</label><input type="text" value="${name||''}" oninput="state.formData.name=this.value" class="w-full mt-1 p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-none text-sm dark:text-white focus:ring-2 focus:ring-indigo-500 transition-shadow"></div><div class="flex-1"><label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Tag <span class="text-red-500">*</span></label><input type="text" value="${tag||''}" oninput="state.formData.tag=this.value" class="w-full mt-1 p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-none text-sm font-mono dark:text-white focus:ring-2 focus:ring-indigo-500 transition-shadow"></div></div><div><label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block">所属分类 (多选)</label><div id="modal-add-cat-scroll" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto custom-scrollbar p-1">${state.categories.map(c => {const isActive = categories.includes(c);return `<button onclick="const arr=state.formData.categories; if(arr.includes('${c}')) state.formData.categories=arr.filter(x=>x!=='${c}'); else state.formData.categories.push('${c}'); renderModal();" class="px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${isActive ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 border-transparent hover:bg-slate-200'}">${c}</button>`;}).join('')}</div></div><div class="flex gap-4"><div class="flex-1"><label class="text-xs font-bold text-slate-500 uppercase tracking-wider">热度</label><input type="number" value="${danbooruCount||0}" oninput="state.formData.danbooruCount=this.value" class="w-full mt-1 p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-none text-sm dark:text-white focus:ring-2 focus:ring-indigo-500 transition-shadow"></div><div class="flex-[2]"><label class="text-xs font-bold text-slate-500 uppercase tracking-wider">封面</label><div onclick="document.getElementById('modal-file').click()" class="mt-1 h-12 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl flex items-center justify-center cursor-pointer relative overflow-hidden group hover:border-indigo-500 transition-colors">${imageUrl ? `<span class="text-xs text-green-500 font-bold">已选择图片 (点击更换)</span>` : `<span class="text-xs text-slate-400">点击上传封面</span>`}<input type="file" id="modal-file" class="hidden" accept="image/*" onchange="compressImage(this.files[0]).then(b64 => {state.formData.imageUrl=b64;renderModal()})"></div></div></div></div><div class="mt-8 flex gap-3"><button onclick="state.modal=null;renderModal()" class="flex-1 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">取消</button><button onclick="actions.saveArtist()" class="flex-1 py-3 rounded-xl font-bold bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 hover:bg-indigo-700 transition-colors">保存</button></div></div></div>`;
                container.appendChild(div);
                const newAddCatScroll = document.getElementById('modal-add-cat-scroll');
                if (newAddCatScroll) { newAddCatScroll.offsetHeight; newAddCatScroll.scrollTop = savedAddCatScroll; }
            }
        };

        const showToast = (msg) => {
            const div = document.createElement('div');
            div.className = 'bg-slate-800 text-white px-5 py-3 rounded-full shadow-xl text-sm font-bold flex items-center gap-2 animate-fade-in z-[200]';
            div.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5 text-green-400"></i> ${msg}`;
            document.getElementById('toast-container').appendChild(div);
            lucide.createIcons(div);
            setTimeout(() => div.remove(), 2000);
        };

        actions.init();

    </script>
</body>
</html>
